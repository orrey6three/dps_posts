<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPS45 - Админка</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-gray-800 p-8 rounded-lg shadow-xl max-w-md w-full">
            <h1 class="text-2xl font-bold mb-6 text-center">Вход в админку</h1>

            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Пароль</label>
                    <input
                        type="password"
                        id="password-input"
                        class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-red-500"
                        placeholder="Введите пароль"
                        required
                    >
                </div>

                <button
                    type="submit"
                    class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-lg transition"
                >
                    Войти
                </button>

                <div id="login-error" class="hidden bg-red-900 text-red-200 p-3 rounded-lg text-sm"></div>
            </form>

            <div class="mt-6 text-center">
                <a href="/" class="text-gray-400 hover:text-white text-sm">← Назад к карте</a>
            </div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel" class="hidden">
        <!-- Header -->
        <header class="bg-gray-800 border-b border-gray-700 p-4">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-bold">DPS45 - Админка</h1>
                    <p class="text-sm text-gray-400">Управление постами ДПС</p>
                </div>
                <div class="flex gap-4">
                    <a href="/" class="text-gray-400 hover:text-white">Карта</a>
                    <button id="logout-btn" class="text-gray-400 hover:text-white">Выйти</button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto p-4 pb-20">
            <!-- Add Post Button -->
            <div class="mb-6">
                <button id="add-post-btn" class="bg-red-600 hover:bg-red-700 text-white font-semibold px-6 py-3 rounded-lg transition">
                    + Добавить пост
                </button>
            </div>

            <!-- Posts List -->
            <div id="posts-list" class="space-y-4">
                <!-- Posts will be loaded here -->
            </div>

            <!-- Loading -->
            <div id="admin-loading" class="text-center py-12">
                <div class="inline-block w-12 h-12 border-4 border-gray-700 border-t-red-600 rounded-full animate-spin"></div>
                <p class="mt-4 text-gray-400">Загрузка...</p>
            </div>
        </main>
    </div>

    <!-- Add/Edit Post Modal -->
    <div id="post-modal" class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="modal-title" class="text-xl font-bold">Добавить пост</h2>
                    <button id="close-modal" class="text-gray-400 hover:text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>

                <form id="post-form" class="space-y-4">
                    <input type="hidden" id="post-id">

                    <div>
                        <label class="block text-sm font-medium mb-2">Название *</label>
                        <input
                            type="text"
                            id="post-title"
                            class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-red-500"
                            required
                        >
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Адрес</label>
                        <input
                            type="text"
                            id="post-address"
                            class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-red-500"
                        >
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">Широта *</label>
                            <input
                                type="number"
                                step="0.0001"
                                id="post-latitude"
                                class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-red-500"
                                required
                            >
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-2">Долгота *</label>
                            <input
                                type="number"
                                step="0.0001"
                                id="post-longitude"
                                class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-red-500"
                                required
                            >
                        </div>
                    </div>

                    <div class="flex gap-3 pt-4">
                        <button
                            type="submit"
                            class="flex-1 bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-lg transition"
                        >
                            Сохранить
                        </button>
                        <button
                            type="button"
                            id="cancel-modal"
                            class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-semibold py-3 rounded-lg transition"
                        >
                            Отмена
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="/js/admin.js"></script>
</body>
</html>
