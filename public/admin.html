<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPS45 — Админ панель</title>
    <link rel="stylesheet" href="/css/admin.css">
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>
</head>
<body>
<div id="login-screen">
    <div class="login-card">
        <h1>Админ панель</h1>
        <form id="login-form">
            <label for="password-input">Пароль</label>
            <input type="password" id="password-input" placeholder="Введите пароль" required>
            <button type="submit">Войти</button>
            <div id="login-error" class="hidden"></div>
        </form>
        <a href="/" class="login-back">← Назад к карте</a>
    </div>
</div>

<div id="admin-panel" class="hidden">
    <header class="admin-header">
        <div class="admin-header-inner">
            <div>
                <h1>DPS45</h1>
                <p>Управление постами ДПС</p>
            </div>
            <div style="display: flex; gap: 16px;">
                <a href="/">Карта</a>
                <button id="logout-btn">Выйти</button>
            </div>
        </div>
    </header>

    <main class="admin-main">
        <button id="add-post-btn" class="add-post-btn">+ Добавить пост</button>
        <div id="posts-list" class="posts-list"></div>
        <div id="admin-loading" class="admin-loading hidden">
            <div class="admin-spinner"></div>
        </div>
    </main>
</div>

<div id="post-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-title">Добавить пост</h2>
            <button id="close-modal" class="modal-close" aria-label="Закрыть">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <form id="post-form">
                <input type="hidden" id="post-id">
                <label for="post-title">Название *</label>
                <input type="text" id="post-title" required>

                <label>Местоположение (кликните на карту)</label>
                <div id="modal-map"></div>

                <div class="form-row">
                    <div>
                        <label for="post-latitude">Широта</label>
                        <input type="number" step="0.000001" id="post-latitude" required>
                    </div>
                    <div>
                        <label for="post-longitude">Долгота</label>
                        <input type="number" step="0.000001" id="post-longitude" required>
                    </div>
                </div>

                <label for="post-address">Адрес</label>
                <input type="text" id="post-address">

                <div class="form-actions">
                    <button type="submit" class="btn-save">Сохранить</button>
                    <button type="button" id="cancel-modal" class="btn-cancel">Отмена</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="confirm-delete-modal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-content confirm-content" role="dialog" aria-modal="true" aria-labelledby="confirm-delete-title">
        <div class="modal-header">
            <h2 id="confirm-delete-title">Удалить пост?</h2>
            <button id="confirm-delete-close" class="modal-close" aria-label="Закрыть">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <p class="confirm-text">Пост будет удалён навсегда. Это действие нельзя отменить.</p>
            <div class="confirm-box">
                <div class="confirm-label">Пост</div>
                <div id="confirm-delete-name" class="confirm-name"></div>
            </div>
            <div class="form-actions">
                <button type="button" id="confirm-delete-cancel" class="btn-cancel">Отмена</button>
                <button type="button" id="confirm-delete-ok" class="btn-danger">Удалить</button>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
<script type="module" src="/js/admin.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
    }
</script>
</body>
</html>
