<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DPS45 — Карта постов ДПС</title>
    <meta name="description" content="Народная карта постов ДПС в Шумихе, Курганская область">

    <!-- Яндекс.Карты API -->
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Map Container -->
    <div id="map"></div>

    <!-- Loading Overlay -->
    <div id="loading" class="loading-overlay">
        <div class="loading-spinner"></div>
        <p>Загрузка карты...</p>
    </div>

    <!-- Bottom Sheet -->
    <div id="bottom-sheet" class="bottom-sheet">
        <div class="bottom-sheet-handle"></div>

        <div id="post-details" class="post-details">
            <h2 id="post-title"></h2>
            <p id="post-address"></p>

            <div class="status-container">
                <div class="status-item">
                    <span class="status-label">Актуально:</span>
                    <span id="relevant-time" class="status-time"></span>
                </div>
                <div class="status-item">
                    <span class="status-label">Неактуально:</span>
                    <span id="irrelevant-time" class="status-time"></span>
                </div>
            </div>

            <div class="button-container">
                <button id="btn-relevant" class="vote-button vote-relevant">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                    <span>Актуально</span>
                </button>
                <button id="btn-irrelevant" class="vote-button vote-irrelevant">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                    <span>Неактуально</span>
                </button>
            </div>

            <div id="vote-message" class="vote-message"></div>
        </div>
    </div>

    <!-- Admin Button -->
    <a href="/admin" class="admin-button" title="Админка">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
        </svg>
    </a>

    <!-- App JS -->
    <script src="./js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
